<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APP-DO | Iniciar Sesión</title>

    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>

    <div class="login-card">

        <div class="logo">
            🔔
        </div>

        <h1>APP-DO</h1>

        <p class="subtitle">
            Recordatorios Inteligentes
        </p>

        <form id="loginForm">

            <label>
                Correo electrónico
            </label>

            <input
                type="email"
                id="correo"
                placeholder="admin@appdo.com"
            >

            <label>
                Contraseña
            </label>

            <input
                type="password"
                id="password"
                placeholder="1234"
            >

            <a href="#" class="forgot">
                ¿Olvidaste tu contraseña?
            </a>

            <button type="submit">
                Iniciar Sesión
            </button>

        </form>
        <a href="registro.html" style="text-decoration: none;">
            <p class="register">
                Crear cuenta
            </p>
        </a>

    </div>

    <script src="auth.js"></script>

</body>
</html>

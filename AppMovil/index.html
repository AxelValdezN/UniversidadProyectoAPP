<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APP-DO - Principal</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>
    <div class="app-contaniner">
        <header class="app-header">
            <div class="header-top">
                <button class="menu-btn" aria-label="Menú">X</button>
                <h1 class="app-title">Pagina de Recordatorios</h1>
                <div class="user-profile"></div>
            </div>
            <div class="date-indicador">
                <span class="current-date">Lunes, 10 de Junio de 2026</span>
            </div>
        </header>
        <section class="search-filter-section">
            <div class="search-bar">
                <span class="search-icon"></span>
            </div>
            <button class="filter-btn" title="Filtrar por categoria">
            <span class="filter-icon">X</span>
            </button>
        </section>
        <main class="reminders-list">
            <div class="reminder-card priority-high">
                <div class="checkbox-wrapper">
                    <input type="checkbox" id="item1" class="reminder-checkbox">
                    <label for="item-1"></label>
                </div>
                <div class="category-icon icon-proyectos" title="Proyectos y negocios"></div>
                <div class="card-details">
                    <h3 class="reminder-title">Insumos</h3>
                    <p class="reminder-date">Vence: 15/06/2026</p>
                </div>
                <div class="card-meta">
                    <span class="reminder-amount">3,450.00</span>
                    <span class="priority-tag tag-high">Alta</span>
                </div>
            </div>
            <div class="reminder-card priority-medium">
                <div class="checkbox-wrapper">
                    <input type="checkbox" id="item2" class="reminder-checkbox">
                    <label for="item-2"></label>
                </div>
                <div class="category-icon icon-servicios" title="Servicios Basicos"></div>
                <div class="card-details">
                    <h3 class="reminder-title">Recibo de luz</h3>
                    <p class="reminder-date">Vence: 01/07/2026</p>
                </div>
                <div class="card-meta">
                    <span class="reminder-amount">450.00</span>
                    <span class="priority-tag tag-medium">Media</span>
                </div>
            </div>
            <div class="reminder-card priority-baja">
                <div class="checkbox-wrapper">
                    <input type="checkbox" id="item3" class="reminder-checkbox">
                    <label for="item-3"></label>
                </div>
                <div class="category-icon icon-entretenimiento" title="Entretenimiento y Digitales"></div>
                <div class="card-details">
                    <h3 class="reminder-title">Netflix</h3>
                    <p class="reminder-date">Vence: 20/06/2026</p>
                </div>
                <div class="card-meta">
                    <span class="reminder-amount">150.00</span>
                    <span class="priority-tag tag-low">Baja</span>
                </div>
            </div>
        </main>
        <footer class="app-footer">
            <button class="btn-confirm-payment" disabled>Confirmar pago</button>
        </footer>
        <button class="fab-add-reminder" title="Agregar nuevo recordatorio">+</button>
    </div>
</body>
</html>

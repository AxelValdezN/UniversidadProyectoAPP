<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Style.css">
    <title>Prototipo</title>
</head>
<body>
    <div class="movile-frame">
        <div class="header">Nuevo Recordatorio</div>
        
        <div class="form-group">
            <label for="title">Título:</label>
            <input type="text" placeholder="Ej. Insumos de cocina">
        </div>
        <div class="form-group">
            <label>Monto a pagar ($):</label>
            <input type="text" placeholder="0.00">
        </div>
        <div class="form-group">
            <label for="date">Fecha de pago:</label>
            <input type="date">
        </div>
        <div class="from-group">
            <label>Categorías</label>
            <div class="categories">
                <div class="category-item" title="Hogar"></div>
                <div class="category-item" title="Servicios Basicos"></div>
                <div class="category-item" title="Banco"></div>
                <div class="category-item" title="Educación"></div>
                <div class="category-item" title="Transporte"></div>
                <div class="category-item" title="Entretenimiento"></div>
                <div class="category-item" title="Proyectos"></div>
                <div class="category-item" title="Otros"></div>
            </div>
        </div> 
        <div class="form-group">
            <label>Avisarme</label>
            <select> 
                <option>1 hora antes</option>
                <option>1 día antes</option>
                <option>Personalizado</option>
            </select>
        </div>
        <div class="buttons">
            <button class="cancel-btn">Cancelar</button>
            <button class="save-btn">Guardar</button>
        </div>
    </div>

</body>
</html>

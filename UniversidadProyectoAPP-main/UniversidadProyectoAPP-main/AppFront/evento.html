<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APP-DO | Nuevo Evento</title>

    <link rel="stylesheet" href="CSS/evento.css">
</head>
<body>

    <div class="phone">

        <header>

            <a href="dashboard.html" class="back">
                ←
            </a>

            <h2>Nuevo Evento</h2>

        </header>

        <form class="event-form" id="formNuevoEvento">

            <label for="titulo">Título</label>
            <input type="text" id="titulo" placeholder="Ej. Pago Netflix" required>

            <label for="fecha">Fecha</label>
            <input type="date" id="fecha" required>

            <label for="hora">Hora</label>
            <input type="time" id="hora" required>
            <label for="monton">Monto </label>
            <input type="number" id="monto" placeholder="Ej. 199.00" step="0.01" required>

            <label for="categoria">Categoría</label>
            <select id="categoria" required>
                <option value="Pago">Pago</option>
                <option value="Escuela">Escuela</option>
                <option value="Trabajo">Trabajo</option>
                <option value="Personal">Personal</option>
            </select>

            <label for="prioridad">Prioridad</label>
            <select id="prioridad" required>
                <option value="Alta">Alta</option>
                <option value="Media">Media</option>
                <option value="Baja">Baja</option>
            </select>

            <label for="notas">Notas</label>
            <textarea id="notas" rows="4" placeholder="Información adicional..."></textarea>

            <button type="submit">Guardar Evento</button>

        </form>

        <nav>

            <a href="dashboard.html">
                🏠
                <span>Inicio</span>
            </a>

            <a href="evento.html" class="active">
                ➕
                <span>Evento</span>
            </a>

            <a href="calendario.html">
                📅
                <span>Calendario</span>
            </a>

            <a href="historial.html">
                📋
                <span>Historial</span>
            </a>

            <a href="perfil.html">
                ⚙️
                <span>Perfil</span>
            </a>

        </nav>

    </div>

</body>
</html>

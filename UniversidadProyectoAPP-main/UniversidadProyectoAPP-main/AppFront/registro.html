<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APP-DO | Crear Cuenta</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>

    <div class="login-card">

        <div class="logo">
            🔔
        </div>

        <h1>Crear Cuenta</h1>
        <p class="subtitle">Registr tu usuario en nuestra APP</p>

        <form id="registroForm">

            <label for="nombre">Apodo</label>
            <input type="text" id="nombre" placeholder="Ej. Marlon" required>

            <label for="correo">Correo </label>
            <input type="email" id="correo" placeholder="tu@correo.com" required>

            <label for="password">Contraseña</label>
            <input type="password" id="password" placeholder="Mínimo 6 caracteres" required minlength="6">

            <label for="confirmPassword">Confirmar Contraseña</label>
            <input type="password" id="confirmPassword" placeholder="Repite tu contraseña" required>

            <button type="submit">
                Registrarse
            </button>

        </form>

        <a href="index.html">
            <p class="register">
                ¿Ya tienes cuenta?, Inicia sesión
            </p>
        </a>

    </div>

    <script src="registro.js"></script>

</body>
</html>
